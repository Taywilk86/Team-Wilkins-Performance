<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Team Wilkins Performance: Week 4/13</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    <style>
        :root {
            --ff-blue: linear-gradient(180deg, #1010a0 0%, #000040 100%);
            --ff-border: #f8f8f8;
            --ff-shadow: #505050;
            --ff-yellow: #ffff00;
        }

        body {
            background-color: #000;
            color: #e2e2e2;
            font-family: sans-serif;
            margin: 0;
            padding: 20px;
        }

        .pixel-font { font-family: 'Press Start 2P', cursive; text-transform: uppercase; }

        .ff-box {
            background: var(--ff-blue);
            border: 4px solid var(--ff-border);
            box-shadow: inset 0 0 0 2px var(--ff-shadow), 0 0 0 2px #000;
            border-radius: 4px;
            padding: 20px;
            margin-bottom: 20px;
        }

        .team-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(380px, 1fr));
            gap: 20px;
        }

        .card {
            background: var(--ff-blue);
            border: 3px solid var(--ff-border);
            box-shadow: inset 0 0 0 2px var(--ff-shadow);
            padding: 15px;
            display: flex;
            gap: 15px;
            position: relative;
        }

        .portrait {
            width: 100px;
            height: 100px;
            border: 2px solid var(--ff-border);
            background-color: #000;
            image-rendering: pixelated;
            object-fit: cover;
        }

        .stats { flex-grow: 1; }

        .name-row { display: flex; justify-content: space-between; margin-bottom: 10px; border-bottom: 2px solid rgba(255,255,255,0.2); padding-bottom: 5px; }
        .stat-line { margin-bottom: 8px; }
        .stat-header { display: flex; justify-content: space-between; font-size: 9px; margin-bottom: 3px; }
        .label { color: #aaa; }
        .val { color: #fff; font-size: 10px; font-weight: bold; }

        .bar-container {
            width: 100%;
            height: 8px;
            background: #400000;
            border: 1px solid #fff;
            position: relative;
        }
        .bar-fill {
            height: 100%;
            transition: width 0.8s ease-in-out;
        }
        
        /* 100% Marker (at 80% of the 125% total width) */
        .hundred-percent-marker {
            position: absolute;
            top: 0;
            left: 80%;
            width: 1px;
            height: 100%;
            background: rgba(255, 255, 255, 0.6);
            z-index: 2;
        }

        .level-badge { color: var(--ff-yellow); font-size: 14px; }
        
        #fileInput {
            background: #111;
            padding: 15px;
            border: 1px dashed var(--ff-border);
            color: white;
            width: 100%;
            cursor: pointer;
        }

        header { text-align: center; margin-bottom: 30px; }
    </style>
</head>
<body>

    <header>
        <div class="ff-box" style="display: inline-block; padding: 20px 50px;">
            <h1 class="pixel-font" style="font-size: 22px; color: var(--ff-yellow); margin: 0;">Team Wilkins Performance</h1>
            <p class="pixel-font" style="font-size: 12px; margin-top: 10px; color: #fff;">Week 4/13 Status Report</p>
        </div>
    </header>

    <div class="ff-box" style="max-width: 1200px; margin: 0 auto 30px auto;">
        <p class="pixel-font" style="font-size: 9px; margin-bottom: 10px; color: #aaa;">Upload Party Data (.xlsx / .csv)</p>
        <input type="file" id="fileInput" accept=".xlsx, .xls, .csv">
    </div>

    <div id="teamGrid" class="team-grid" style="max-width: 1200px; margin: 0 auto;">
        </div>

    <script>
        const characterProfiles = [
            { name: "Terra", img: "https://www.videogamesprites.net/FinalFantasy6/Party/Terra/Terra%20-%20Portrait.png" },
            { name: "Locke", img: "https://www.videogamesprites.net/FinalFantasy6/Party/Locke/Locke%20-%20Portrait.png" },
            { name: "Celes", img: "https://www.videogamesprites.net/FinalFantasy6/Party/Celes/Celes%20-%20Portrait.png" },
            { name: "Edgar", img: "https://www.videogamesprites.net/FinalFantasy6/Party/Edgar/Edgar%20-%20Portrait.png" },
            { name: "Sabin", img: "https://www.videogamesprites.net/FinalFantasy6/Party/Sabin/Sabin%20-%20Portrait.png" },
            { name: "Shadow", img: "https://www.videogamesprites.net/FinalFantasy6/Party/Shadow/Shadow%20-%20Portrait.png" },
            { name: "Cyan", img: "https://www.videogamesprites.net/FinalFantasy6/Party/Cyan/Cyan%20-%20Portrait.png" },
            { name: "Setzer", img: "https://www.videogamesprites.net/FinalFantasy6/Party/Setzer/Setzer%20-%20Portrait.png" },
            { name: "Relm", img: "https://www.videogamesprites.net/FinalFantasy6/Party/Relm/Relm%20-%20Portrait.png" },
            { name: "Strago", img: "https://www.videogamesprites.net/FinalFantasy6/Party/Strago/Strago%20-%20Portrait.png" },
            { name: "Mog", img: "https://www.videogamesprites.net/FinalFantasy6/Party/Mog/Mog%20-%20Portrait.png" },
            { name: "Gau", img: "https://www.videogamesprites.net/FinalFantasy6/Party/Gau/Gau%20-%20Portrait.png" }
        ];

        document.getElementById('fileInput').addEventListener('change', function(e) {
            const file = e.target.files[0];
            const reader = new FileReader();

            reader.onload = function(evt) {
                const data = evt.target.result;
                const workbook = XLSX.read(data, { type: 'binary' });
                const firstSheet = workbook.SheetNames[0];
                const rows = XLSX.utils.sheet_to_json(workbook.Sheets[firstSheet], { raw: false });
                
                // RANKING LOGIC: Sort by Total (Character Level) descending
                rows.sort((a, b) => parseFloat(b['Total'] || 0) - parseFloat(a['Total'] || 0));
                
                renderTeam(rows);
            };
            reader.readAsBinaryString(file);
        });

        function getNumericValue(val) {
            if (!val) return 0;
            let str = val.toString().replace('%', '');
            let num = parseFloat(str);
            // Convert decimal 0.95 to 95, but keep 110 as 110
            if (num <= 1.25 && num > 0 && val.toString().includes('.')) num = num * 100;
            return num;
        }

        function renderTeam(members) {
            const grid = document.getElementById('teamGrid');
            grid.innerHTML = '';

            members.forEach((m, i) => {
                const profile = characterProfiles[i % characterProfiles.length];
                const name = m['Secret Name'] || 'Recruit';
                const level = m['Total'] || '1';
                
                const statsConfig = [
                    { label: 'MANA (Res)', key: 'Resolution' },
                    { label: 'STAMINA (AHT)', key: 'AHT' },
                    { label: 'INTEL (Xfer)', key: 'Transfer Rate' },
                    { label: 'SKILL (Adhere)', key: 'Schedule Adherence' }
                ];

                let statHTML = '';
                statsConfig.forEach(s => {
                    const rawVal = m[s.key] || '0%';
                    const numVal = getNumericValue(rawVal);
                    // Scale width for 125% max display
                    const barWidth = (numVal / 125) * 100;
                    
                    // Color Logic: Normal Green vs Overdrive Purple
                    const color = numVal > 100 
                        ? 'linear-gradient(90deg, #db2ef2, #ffffff)' 
                        : 'linear-gradient(90deg, #228b22, #32cd32)';

                    statHTML += `
                        <div class="stat-line">
                            <div class="stat-header">
                                <span class="label pixel-font" style="font-size:7px;">${s.label}</span>
                                <span class="val">${rawVal}</span>
                            </div>
                            <div class="bar-container">
                                <div class="hundred-percent-marker"></div>
                                <div class="bar-fill" style="width: ${Math.min(barWidth, 100)}%; background: ${color}"></div>
                            </div>
                        </div>
                    `;
                });

                grid.innerHTML += `
                    <div class="card">
                        <img src="${profile.img}" class="portrait">
                        <div class="stats">
                            <div class="name-row">
                                <span class="pixel-font" style="font-size: 11px; color: var(--ff-yellow);">${name}</span>
                                <span class="pixel-font level-badge">LV ${level}</span>
                            </div>
                            ${statHTML}
                        </div>
                    </div>
                `;
            });
        }
    </script>
</body>
</html>
