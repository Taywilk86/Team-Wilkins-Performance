<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Team Wilkins Performance: Week 4/13</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --ff-blue: linear-gradient(180deg, #1010a0 0%, #000040 100%);
            --ff-border: #f8f8f8;
            --ff-shadow: #505050;
            --ff-yellow: #ffff00;
        }

        body {
            background-color: #000;
            color: #e2e2e2;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 20px;
            overflow-x: hidden;
        }

        /* CRT Scanline Effect Overlay */
        body::before {
            content: " ";
            position: fixed;
            top: 0; left: 0; bottom: 0; right: 0;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.1) 50%);
            background-size: 100% 4px;
            z-index: 100;
            pointer-events: none;
        }

        .pixel-font { font-family: 'Press Start 2P', cursive; text-transform: uppercase; }

        .ff-box {
            background: var(--ff-blue);
            border: 4px solid var(--ff-border);
            box-shadow: inset 0 0 0 2px var(--ff-shadow), 0 0 0 2px #000;
            border-radius: 4px;
            padding: 20px;
            margin-bottom: 20px;
            position: relative;
        }

        .team-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(380px, 1fr));
            gap: 20px;
        }

        .card {
            background: var(--ff-blue);
            border: 3px solid var(--ff-border);
            box-shadow: inset 0 0 0 2px var(--ff-shadow);
            padding: 15px;
            display: flex;
            gap: 15px;
            transition: transform 0.2s;
        }
        
        .card:hover { transform: scale(1.02); z-index: 10; }

        .portrait {
            width: 100px;
            height: 100px;
            border: 2px solid var(--ff-border);
            background-color: #1a1a1a;
            image-rendering: pixelated;
        }

        .stats { flex-grow: 1; }
        .name-row { display: flex; justify-content: space-between; margin-bottom: 10px; border-bottom: 2px solid rgba(255,255,255,0.2); padding-bottom: 5px; }
        .stat-line { margin-bottom: 8px; }
        .stat-header { display: flex; justify-content: space-between; font-size: 9px; margin-bottom: 3px; }
        .label { color: #aaa; }
        .val { color: #fff; font-size: 10px; font-weight: bold; }

        .bar-container {
            width: 100%;
            height: 8px;
            background: #400000;
            border: 1px solid #fff;
            position: relative;
        }
        .bar-fill { height: 100%; transition: width 0.8s ease-in-out; }
        .hundred-percent-marker {
            position: absolute;
            top: 0; left: 80%; width: 1px; height: 100%;
            background: rgba(255, 255, 255, 0.6); z-index: 2;
        }

        .level-badge { color: var(--ff-yellow); font-size: 14px; }
        
        .controls {
            display: flex;
            gap: 10px;
            align-items: center;
            flex-wrap: wrap;
        }

        #fileInput {
            background: rgba(0,0,0,0.5);
            padding: 10px;
            border: 1px dashed var(--ff-border);
            color: white;
            cursor: pointer;
            flex-grow: 1;
        }

        .ff-button {
            background: #222;
            color: #fff;
            border: 2px solid var(--ff-border);
            padding: 10px 15px;
            cursor: pointer;
            font-size: 8px;
        }

        .ff-button:hover { background: #444; color: var(--ff-yellow); }

        header { text-align: center; margin-bottom: 30px; }
    </style>
</head>
<body>

    <header>
        <div class="ff-box" style="display: inline-block; padding: 20px 50px;">
            <h1 class="pixel-font" style="font-size: 22px; color: var(--ff-yellow); margin: 0;">Team Wilkins Performance</h1>
            <p class="pixel-font" style="font-size: 12px; margin-top: 10px; color: #fff;">Week 4/13 Status Report</p>
        </div>
    </header>

    <div class="ff-box" style="max-width: 1200px; margin: 0 auto 30px auto;">
        <p class="pixel-font" style="font-size: 9px; margin-bottom: 10px; color: #aaa;">Party Command: Upload Data</p>
        <div class="controls">
            <input type="file" id="fileInput" accept=".xlsx, .xls, .csv">
            <button class="ff-button pixel-font" onclick="clearData()">Reset Party</button>
        </div>
        <p id="statusMsg" class="pixel-font" style="font-size: 8px; color: #32cd32; margin-top: 10px; display:none;">Data saved!</p>
    </div>

    <div id="teamGrid" class="team-grid" style="max-width: 1200px; margin: 0 auto;"></div>

    <script>
        // --- 1. PROCEDURAL SNES PORTRAIT GENERATOR ---
        function seededRandom(seed) {
            let hash = 0;
            for (let i = 0; i < seed.length; i++) {
                hash = ((hash << 5) - hash) + seed.charCodeAt(i);
                hash |= 0; 
            }
            return function() {
                hash = (hash * 1664525 + 1013904223) | 0;
                return (hash >>> 0) / 4294967296;
            };
        }

        function generatePixelPortrait(name) {
            const canvas = document.createElement('canvas');
            const ctx = canvas.getContext('2d');
            canvas.width = 100;
            canvas.height = 100;
            
            const seedName = name || "Recruit";
            const rand = seededRandom(seedName);
            
            const size = 10; 
            const pS = 10; // Pixel size
            
            const palettes = [
                ['#ffcc99', '#5c3c2e', '#4a90e2', '#2c3e50'], // Hero
                ['#e0c090', '#34495e', '#e74c3c', '#c0392b'], // Knight
                ['#f3e5ab', '#8e44ad', '#f1c40f', '#d35400'], // Mage
                ['#d2b48c', '#27ae60', '#ecf0f1', '#2ecc71'], // Ranger
                ['#ffffff', '#2c3e50', '#95a5a6', '#7f8c8d']  // Ninja
            ];
            const palette = palettes[Math.floor(rand() * palettes.length)];

            ctx.fillStyle = '#1a1a1a';
            ctx.fillRect(0, 0, 100, 100);

            for (let y = 0; y < size; y++) {
                for (let x = 0; x < size / 2; x++) {
                    let fill = false;
                    // Logic to shape a head/bust
                    if (y > 1 && y < 8 && x > 0) fill = rand() > 0.3;
                    
                    if (fill) {
                        let color;
                        if (y < 4) color = palette[1]; // Hair
                        else if (y < 7) color = palette[0]; // Skin
                        else color = palette[2]; // Armor

                        ctx.fillStyle = color;
                        ctx.fillRect(x * pS, y * pS, pS, pS);
                        ctx.fillRect((size - 1 - x) * pS, y * pS, pS, pS);
                    }
                }
            }

            // Eyes (Fixed placement for character feel)
            ctx.fillStyle = '#000';
            ctx.fillRect(25, 45, 10, 10);
            ctx.fillRect(65, 45, 10, 10);
            
            // Stylized highlight
            ctx.fillStyle = 'rgba(255,255,255,0.05)';
            ctx.fillRect(0, 0, 100, 40);

            return canvas.toDataURL();
        }

        // --- 2. DATA HANDLING ---
        window.onload = function() {
            const savedData = localStorage.getItem('wilkinsTeamData');
            if (savedData) {
                renderTeam(JSON.parse(savedData));
                const msg = document.getElementById('statusMsg');
                msg.innerText = "Party loaded from memory!";
                msg.style.display = 'block';
            }
        };

        document.getElementById('fileInput').addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (!file) return;
            const reader = new FileReader();

            reader.onload = function(evt) {
                try {
                    const data = evt.target.result;
                    const workbook = XLSX.read(data, { type: 'binary' });
                    const firstSheet = workbook.SheetNames[0];
                    const rows = XLSX.utils.sheet_to_json(workbook.Sheets[firstSheet], { raw: false });
                    
                    // Sort by total performance (Level)
                    rows.sort((a, b) => parseFloat(b['Total'] || 0) - parseFloat(a['Total'] || 0));
                    localStorage.setItem('wilkinsTeamData', JSON.stringify(rows));
                    
                    renderTeam(rows);
                    const msg = document.getElementById('statusMsg');
                    msg.innerText = "Data Transferred! Party Updated.";
                    msg.style.display = 'block';
                } catch (err) {
                    alert("Error parsing file. Ensure your headers match.");
                    console.error(err);
                }
            };
            reader.readAsBinaryString(file);
        });

        function clearData() {
            if(confirm("Reset the party? This clears local storage.")) {
                localStorage.removeItem('wilkinsTeamData');
                location.reload();
            }
        }

        function getNumericValue(val) {
            if (!val) return 0;
            let str = val.toString().replace('%', '').trim();
            let num = parseFloat(str);
            // Convert decimals (0.95) to whole percents (95)
            if (num <= 1.25 && num > 0 && val.toString().includes('.')) num = num * 100;
            return isNaN(num) ? 0 : num;
        }

        // --- 3. UI RENDERING ---
        function renderTeam(members) {
            const grid = document.getElementById('teamGrid');
            grid.innerHTML = '';

            members.forEach((m) => {
                const name = m['Secret Name'] || 'Recruit';
                const level = m['Total'] || '1';
                const portrait = generatePixelPortrait(name);
                
                const statsConfig = [
                    { label: 'MANA (Res)', key: 'Resolution' },
                    { label: 'STAMINA (AHT)', key: 'AHT' },
                    { label: 'INTEL (Xfer)', key: 'Transfer Rate' },
                    { label: 'SKILL (Adhere)', key: 'Schedule Adherence' }
                ];

                let statHTML = '';
                statsConfig.forEach(s => {
                    const rawVal = m[s.key] || '0%';
                    const numVal = getNumericValue(rawVal);
                    const barWidth = (numVal / 125) * 100;
                    
                    const color = numVal > 100 
                        ? 'linear-gradient(90deg, #db2ef2, #ffffff)' 
                        : 'linear-gradient(90deg, #228b22, #32cd32)';

                    statHTML += `
                        <div class="stat-line">
                            <div class="stat-header">
                                <span class="label pixel-font" style="font-size:7px;">${s.label}</span>
                                <span class="val">${rawVal}</span>
                            </div>
                            <div class="bar-container">
                                <div class="hundred-percent-marker"></div>
                                <div class="bar-fill" style="width: ${Math.min(barWidth, 100)}%; background: ${color}"></div>
                            </div>
                        </div>
                    `;
                });

                grid.innerHTML += `
                    <div class="card">
                        <img src="${portrait}" class="portrait">
                        <div class="stats">
                            <div class="name-row">
                                <span class="pixel-font" style="font-size: 11px; color: var(--ff-yellow);">${name}</span>
                                <span class="pixel-font level-badge">LV ${level}</span>
                            </div>
                            ${statHTML}
                        </div>
                    </div>
                `;
            });
        }
    </script>
</body>
</html>
